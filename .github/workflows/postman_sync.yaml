name: Sync OpenAPI to Postman Cloud

permissions:
  contents: read

"on":
  push:
    branches:
      - main
    paths:
      - partner.json
  workflow_dispatch: {}

jobs:
  sync-postman:
    name: Generate and push collection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Convert OpenAPI to Postman collection
        run: npx openapi-to-postmanv2 -s partner.json -o generated_collection.json

      - name: Update Postman collection
        env:
          POSTMAN_API_KEY: ${{ secrets.POSTMAN_API_KEY }}
          POSTMAN_COLLECTION_ID: ${{ secrets.POSTMAN_COLLECTION_ID }}
        run: |
          jq '{collection: .}' generated_collection.json > postman_payload.json

          response_file="$(mktemp)"
          http_code="$(
            curl --silent --show-error --output "$response_file" --write-out '%{http_code}' \
              --request PUT \
              --url "https://api.getpostman.com/collections/${POSTMAN_COLLECTION_ID}" \
              --header "X-Api-Key: ${POSTMAN_API_KEY}" \
              --header "Content-Type: application/json" \
              --data-binary @postman_payload.json
          )"

          cat "$response_file"

          if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
            echo "Postman API request failed with HTTP ${http_code}"
            exit 1
          fi
