name: OpenAPI Diff Check

on:
  pull_request:
    branches: ["main"]

jobs:
  oasdiff:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout PR code
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Install oasdiff
      - name: Install oasdiff
        run: |
          go install github.com/oasdiff/oasdiff@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      # 3. Fetch base branch (main)
      - name: Fetch base branch
        run: |
          git fetch origin main

      # 4. Run oasdiff
      - name: Run OpenAPI diff
        run: |
          oasdiff diff \
            origin/main:partner.json \
            HEAD:partner.json \
            --fail-on-diff \
            --summary \
            --format github
