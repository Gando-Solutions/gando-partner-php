name: Generate
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write
"on":
  workflow_dispatch:
    inputs:
      force:
        description: Force generation of SDKs
        type: boolean
        default: false
      set_version:
        description: optionally set a specific SDK version
        type: string
  schedule:
    - cron: 0 0 * * *
  pull_request:
    types:
      - labeled
      - unlabeled
jobs:
  openapi-breaking:
    name: Check Partner OpenAPI breaking changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch base branch
        run: git fetch --depth=1 origin ${{ github.base_ref || 'main' }}
      - name: Breaking changes (partner.json)
        uses: oasdiff/oasdiff-action/breaking@v0.0.52
        with:
          base: origin/${{ github.base_ref || 'main' }}:partner.json
          revision: HEAD:partner.json
          fail-on: ERR

  generate:
    needs: openapi-breaking
    uses: speakeasy-api/sdk-generation-action/.github/workflows/workflow-executor.yaml@v15
    with:
      force: ${{ github.event.inputs.force }}
      mode: pr
      set_version: ${{ github.event.inputs.set_version }}
    secrets:
      # Enterprise policy pins the default GITHUB_TOKEN to read-only, so it cannot
      # push the generated branch or open the PR. Use a dedicated token (fine-grained
      # PAT) with Contents:write + Pull requests:write + Workflows:write on this repo.
      github_access_token: ${{ secrets.SDK_BOT_TOKEN }}
      packagist_token: ${{ secrets.PACKAGIST_TOKEN }}
      packagist_username: ${{ secrets.PACKAGIST_USERNAME }}
      speakeasy_api_key: ${{ secrets.SPEAKEASY_API_KEY }}
  postprocess:
    name: Post-process generated SDK
    needs: generate
    if: ${{ needs.generate.outputs.branch_name != '' }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout generated branch
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.generate.outputs.branch_name }}
          token: ${{ secrets.SDK_BOT_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      - name: Install dependencies
        run: composer install --no-interaction --no-progress

      - name: Run post-processors
        run: composer lint && composer rector

      - name: Commit post-processing changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .
            git commit -m "chore: apply sdk post-processors (pint + rector)"
            git push origin HEAD:${{ needs.generate.outputs.branch_name }}
          else
            echo "No post-processing changes to commit."
          fi
